# GitHub Actions workflow that builds the Next.js app and publishes the
# resulting static site to GitHub Pages on every push to main.
#
# Setup steps (one-time, in the repo's GitHub UI):
#   1. Settings → Pages → "Build and deployment" → Source: "GitHub Actions"
#   2. (Optional) If your repo is at username.github.io/REPO_NAME instead of
#      a custom domain, set the BASE_PATH variable below to "/REPO_NAME".
#      Without that, asset URLs will 404 because Next emits root-relative paths.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  # `contents: write` (not `read`) so the workflow can push the built site
  # to a `gh-pages` branch — used to ferry the static output to environments
  # that don't allow GitHub-hosted Actions runners (e.g., locked-down
  # corporate GitHub Enterprise where only "Deploy from a branch" Pages
  # mode is permitted).
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # Using `npm install` (not `npm ci`) because we don't ship a
        # package-lock.json. The workflow generates one on the fly.
        # First build is ~30s slower without npm's cache; that's fine for
        # a project that builds once or twice a day.
        run: npm install

      - name: Detect base path
        id: base
        run: |
          # If repo is published at username.github.io (i.e., the repo IS named
          # username.github.io), no base path is needed. Otherwise the site
          # lives at username.github.io/REPO_NAME and needs basePath=/REPO_NAME.
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER_LOWER="$(echo ${GITHUB_REPOSITORY%%/*} | tr '[:upper:]' '[:lower:]')"
          REPO_LOWER="$(echo $REPO_NAME | tr '[:upper:]' '[:lower:]')"
          if [ "$REPO_LOWER" = "${OWNER_LOWER}.github.io" ]; then
            echo "base_path=" >> $GITHUB_OUTPUT
          else
            echo "base_path=/${REPO_NAME}" >> $GITHUB_OUTPUT
          fi
          echo "Detected base_path: '${{ steps.base.outputs.base_path }}'"

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.base_path }}
        run: npm run build

      - name: Disable Jekyll on Pages
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      # Also publish the built site to a `gh-pages` branch so it can be
      # downloaded as a zip and uploaded to a different GitHub instance
      # (e.g., a corporate GitHub Enterprise that doesn't allow GitHub-
      # hosted Actions runners). Force-orphan keeps the branch a single
      # commit so the download is small.
      - name: Publish built site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Auto-publish built static site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
